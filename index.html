
<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Monitor de Emergencias | España Inteligencia IA</title>
    <meta name="description" content="Sistema de monitorización de emergencias en tiempo real para España. Agregación de AEMET, DGT y 112 mediante IA." />
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚨</text></svg>">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Monitor de Emergencias España" />
    <meta property="og:description" content="Inteligencia situacional en tiempo real impulsada por Gemini IA." />
    <meta property="og:image" content="https://alerta-local-espa-a-249485768002.us-west1.run.app/favicon.ico" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              emergency: {
                50: '#fef2f2',
                100: '#fee2e2',
                500: '#ef4444',
                700: '#b91c1c',
                900: '#7f1d1d',
              },
              official: {
                500: '#2563eb',
              },
              social: {
                500: '#8b5cf6',
              }
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-slow': 'spin 8s linear infinite',
              'radar': 'radar 4s linear infinite',
            },
            keyframes: {
              radar: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .animate-in { animation: fade-in 0.6s ease-out forwards; }

      /* Tactical Grid Background */
      .bg-grid {
        background-image: radial-gradient(circle, #334155 1px, transparent 1px);
        background-size: 30px 30px;
      }
      .dark .bg-grid {
        background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "recharts": "https://esm.sh/recharts@^3.6.0"
      }
    }
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden selection:bg-blue-500 selection:text-white transition-colors duration-300">
    <div id="root"></div>
  </body>
</html>
